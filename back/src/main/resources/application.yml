spring:
  datasource:
    # NOTE: Don't commit real passwords into git. Prefer environment variables.
    url: ${DB_URL:jdbc:mysql://localhost:3306/sch1?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  mail:
    # Optional: used by email verification code.
    host: ${MAIL_HOST:smtp.qq.com}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# App-level configs (extend later)
app:
  ai:
    enabled: ${AI_ENABLED:false}
    dashscope-api-key: ${DASHSCOPE_API_KEY:}
    model: ${QWEN_MODEL:qwen-plus}
  storage:
    root-dir: ${STORAGE_ROOT:uploads}
    max-files: ${UPLOAD_MAX_FILES:20}
    max-file-bytes: ${UPLOAD_MAX_FILE_BYTES:2097152}
